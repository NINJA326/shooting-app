<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>NINJA 成長記録</title><script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script><style>
:root{--bg:#07110c;--card:#102219;--card2:#142b20;--line:#244634;--green:#25d47a;--green2:#76f0aa;--text:#f6fff9;--muted:#a8c4b2;--red:#ff6b6b}*{box-sizing:border-box}body{margin:0;background:linear-gradient(180deg,#06100b,#0a1710);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif}.wrap{max-width:620px;margin:auto;padding:18px 14px 40px}.card,.hero{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:16px;margin-bottom:14px}.login{margin-top:8vh}.brand{font-size:12px;letter-spacing:1.8px;color:var(--green2);font-weight:900}.title,.name{font-size:26px;font-weight:900;margin:7px 0 4px}.sub,.meta,.note,.small{color:var(--muted)}label{display:block;font-size:13px;font-weight:800;margin:14px 0 6px}input{width:100%;border:1px solid var(--line);background:#0b1a12;color:var(--text);border-radius:13px;padding:14px;font-size:16px}button{width:100%;border:0;border-radius:14px;padding:14px;font-size:15px;font-weight:900}.primary{background:var(--green);color:#052010;margin-top:16px}.secondary{background:#173424;color:var(--text);border:1px solid var(--line);margin-top:10px}.danger{background:#371b1b;color:#ffd6d6;border:1px solid #713232;margin-top:10px}.error{display:none;background:#3a1818;border:1px solid #7b3030;color:#ffd6d6;border-radius:14px;padding:12px;margin-top:12px}.loading{text-align:center;padding:45px;color:var(--muted)}.tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}.tab{border:1px solid var(--line);background:#10271c;color:var(--muted);padding:11px 4px}.tab.active{background:var(--green);color:#052010}.panel{display:none}.panel.active{display:block}.metrics{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.metric{background:var(--card2);border:1px solid var(--line);border-radius:16px;padding:14px}.label{font-size:12px;color:var(--muted)}.value{font-size:24px;font-weight:900;margin-top:4px}.list{display:grid;gap:9px}.row{display:flex;justify-content:space-between;align-items:center;gap:10px;background:var(--card2);border:1px solid var(--line);border-radius:14px;padding:12px}.row span{color:var(--green2);font-weight:900;text-align:right}.empty{text-align:center;color:var(--muted);padding:20px}canvas{max-height:250px}.small{text-align:center;font-size:11px;margin-top:10px}h2{font-size:17px;margin:0 0 12px}
</style></head><body><div class="wrap">
<section id="loginView" class="card login"><div class="brand">NINJA PLAYER DATA</div><div class="title">成長記録ログイン</div><div class="sub">初回のみ選手IDとパスワードを入力します。ログイン状態は30日間保持されます。</div><label>選手ID</label><input id="playerId" autocomplete="username"><label>パスワード</label><input id="password" type="password" autocomplete="current-password"><button id="loginBtn" class="primary">ログイン</button><div id="loginError" class="error"></div></section>
<section id="loadingView" class="card loading" style="display:none">成長記録を読み込んでいます…</section>
<main id="appView" style="display:none"><section class="hero"><div class="brand">NINJA PLAYER DATA</div><div id="playerName" class="name"></div><div id="playerMeta" class="meta"></div></section><div class="tabs"><button class="tab active" data-tab="shooting">シュート</button><button class="tab" data-tab="body">身体成長</button><button class="tab" data-tab="agility">アジリティ</button></div>
<section id="shooting" class="panel active"><div class="card"><h2>シュート総合</h2><div class="metrics"><div class="metric"><div class="label">総成功数</div><div id="totalMade" class="value">-</div></div><div class="metric"><div class="label">総試投数</div><div id="totalAttempts" class="value">-</div></div><div class="metric"><div class="label">総合成功率</div><div id="totalRate" class="value">-</div></div><div class="metric"><div class="label">最新入力日</div><div id="shootLatest" class="value" style="font-size:16px">-</div></div></div></div><div class="card"><h2>種目別成功率</h2><div id="shotRates" class="list"></div></div><div class="card"><h2>月別シュート成功率</h2><canvas id="shootChart"></canvas></div></section>
<section id="body" class="panel"><div class="card"><h2>最新の身体測定</h2><div class="metrics"><div class="metric"><div class="label">身長</div><div id="heightNow" class="value">-</div><div id="heightDiff" class="note"></div></div><div class="metric"><div class="label">体重</div><div id="weightNow" class="value">-</div><div id="weightDiff" class="note"></div></div></div></div><div class="card"><h2>身長の推移</h2><canvas id="heightChart"></canvas></div><div class="card"><h2>体重の推移</h2><canvas id="weightChart"></canvas></div></section>
<section id="agility" class="panel"><div class="card"><h2>最新アジリティ記録</h2><div id="agilityList" class="list"></div></div></section><button id="refreshBtn" class="secondary">最新情報に更新</button><button id="logoutBtn" class="danger">ログアウト</button><div id="appError" class="error"></div><div class="small">本人の記録のみ表示します。</div></main></div>
<script>
const GAS_URL='https://script.google.com/macros/s/AKfycbwQ-vrkGPdBZnhV2wjZI0aXxb3jAn6qH4_rS6TJ-85EwzIS5Y96-pR2t42kN-e0NhrQRw/exec',SESSION_KEY='ninja_growth_session_v1';let charts={};
window.addEventListener('load',async()=>{bind();const s=getSession();if(s)await loadDashboard(s.token,true)});
function bind(){loginBtn.onclick=login;password.onkeydown=e=>{if(e.key==='Enter')login()};refreshBtn.onclick=()=>{const s=getSession();if(s)loadDashboard(s.token,false)};logoutBtn.onclick=logout;document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));b.classList.add('active');document.getElementById(b.dataset.tab).classList.add('active')})}
async function login(){const playerId=document.getElementById('playerId').value.trim(),password=document.getElementById('password').value;if(!playerId||!password)return err('loginError','選手IDとパスワードを入力してください。');busy(true);hide();try{const r=await jsonp('growthLogin',{playerId,password});if(!r||r.status!=='ok')throw Error(r&&r.message||'ログインできませんでした。');localStorage.setItem(SESSION_KEY,JSON.stringify({token:r.token,expiresAt:r.expiresAt}));document.getElementById('password').value='';await loadDashboard(r.token,false)}catch(e){busy(false);err('loginError',e.message)}}
async function loadDashboard(token,silent){view('loading');hide();try{const r=await jsonp('growthDashboard',{token});if(!r||r.status!=='ok'){if(r&&r.code==='SESSION_EXPIRED'){localStorage.removeItem(SESSION_KEY);view('login');if(!silent)err('loginError','ログイン期限が切れました。');return}throw Error(r&&r.message||'データ取得失敗')}render(r);view('app')}catch(e){if(silent){localStorage.removeItem(SESSION_KEY);view('login');err('loginError','自動ログインできませんでした。')}else{view('app');err('appError',e.message)}}finally{busy(false)}}
function render(r){text('playerName',r.player.name);text('playerMeta',r.player.category+' / '+r.player.playerId);const s=r.shooting;text('totalMade',s.totalMade+'本');text('totalAttempts',s.totalAttempts+'本');text('totalRate',s.totalRate+'%');text('shootLatest',s.latestDate||'記録なし');shotRates.innerHTML=s.byType.length?'':'<div class="empty">記録がありません</div>';s.byType.forEach(x=>shotRates.insertAdjacentHTML('beforeend',`<div class="row"><strong>${esc(x.type)}</strong><span>${x.rate}%（${x.made}/${x.attempts}）</span></div>`));draw('shootChart',s.monthly.map(x=>x.month),s.monthly.map(x=>x.rate),'成功率（%）');const b=r.body;text('heightNow',b.latestHeight==null?'-':b.latestHeight+'cm');text('weightNow',b.latestWeight==null?'-':b.latestWeight+'kg');text('heightDiff',diff(b.heightChange,'cm'));text('weightDiff',diff(b.weightChange,'kg'));draw('heightChart',b.months,b.heights,'身長（cm）');draw('weightChart',b.months,b.weights,'体重（kg）');agilityList.innerHTML=r.agility.length?'':'<div class="empty">記録がありません</div>';r.agility.forEach(x=>agilityList.insertAdjacentHTML('beforeend',`<div class="row"><div><strong>${esc(x.event)}</strong><div class="note">${esc(x.date||'')}</div></div><span>${esc(x.value)}${esc(x.unit||'')}</span></div>`))}
function jsonp(action,params={}){return new Promise((resolve,reject)=>{const cb='ninjaCb_'+Date.now()+'_'+Math.random().toString(36).slice(2),s=document.createElement('script'),timer=setTimeout(()=>done(Error('通信がタイムアウトしました。')),25000);function done(e,d){clearTimeout(timer);delete window[cb];s.remove();e?reject(e):resolve(d)}window[cb]=d=>done(null,d);s.src=GAS_URL+'?'+new URLSearchParams({action,callback:cb,...params,_:Date.now()});s.onerror=()=>done(Error('サーバーへ接続できませんでした。'));document.body.appendChild(s)})}
function getSession(){try{const s=JSON.parse(localStorage.getItem(SESSION_KEY)||'null');if(!s||!s.token||Date.now()>=Number(s.expiresAt||0)){localStorage.removeItem(SESSION_KEY);return null}return s}catch(e){return null}}async function logout(){const s=getSession();localStorage.removeItem(SESSION_KEY);if(s)jsonp('growthLogout',{token:s.token}).catch(()=>{});view('login')}function view(v){loginView.style.display=v==='login'?'block':'none';loadingView.style.display=v==='loading'?'block':'none';appView.style.display=v==='app'?'block':'none'}function busy(v){loginBtn.disabled=v;loginBtn.textContent=v?'確認中…':'ログイン'}function err(id,m){const e=document.getElementById(id);e.textContent=m;e.style.display='block'}function hide(){document.querySelectorAll('.error').forEach(e=>e.style.display='none')}function text(id,v){document.getElementById(id).textContent=v}function diff(v,u){return v==null?'比較できる記録がありません':`初回から ${v>0?'+':''}${v}${u}`}function esc(v){return String(v??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]))}function draw(id,labels,data,label){const c=document.getElementById(id);if(charts[id])charts[id].destroy();charts[id]=new Chart(c,{type:'line',data:{labels,datasets:[{label,data,tension:.3,fill:false}]},options:{responsive:true}})}
</script></body></html>
